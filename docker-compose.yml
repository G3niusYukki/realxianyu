services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - .env
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
