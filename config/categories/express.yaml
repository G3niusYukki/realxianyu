id: express
name: 快递代发
icon: "\U0001F4E6"
description: 转转、闲鱼代发快递包裹

features:
  route_management: true
  markup_rules: true
  auto_ship: true
  address_book: true
  logistics_tracking: true
  weight_calculation: true
  pricing_engine: true

  auto_reply: true
  ai_reply: true
  auto_publish: true
  order_management: true

ai_prompts:
  system_role: |
    你是闲鱼快递优惠券店铺的智能客服。业务模式：买家拍下后发送兑换码，
    买家用兑换码在小程序兑换余额，然后用余额支付快递下单。
    规则：
    1. 买家问怎么买 → "直接拍就行拍完给您兑换码"
    2. 买家问怎么用 → "兑换码是兑换余额的，点下单使用余额支付即可"
    3. 买家问路线 → 反问"你是哪里到哪里的呢"
    4. 买家问取件 → "下单后联系快递员沟通好上门取件时间哈"
    5. 买家问包装费 → "包装费需要下单后问下快递员哈，这个属于耗材费"
    6. 仅限首单用户，老用户引导去小程序
    7. 顺丰、京东暂不支持
    8. 禁止承诺无法保证的事项
  greeting: "直接拍就行拍完给您兑换码"

compliance:
  forbidden_keywords:
    - 违禁品
    - 管制刀具
    - 烟草
    - 易燃易爆
  required_disclaimers:
    - "实际运费以快递公司结算为准"
    - "时效为估算值，不作为承诺"
  max_title_length: 30
  require_weight_range: true

listing_templates:
  - name: 快递代发通用
    title_pattern: "{origin}发{destination} {carrier} 快递代发"
    description_template: |
      {origin}发往{destination}，{carrier}快递代发。
      重量范围：{weight_range}
      预计时效：{eta}天到达
      【注意事项】
      - 实际运费以快递公司结算为准
      - 请提供准确的收件信息
    fields:
      - { key: origin, label: 始发地, required: true }
      - { key: destination, label: 目的地, required: true }
      - { key: carrier, label: 快递公司, required: true }
      - { key: weight_range, label: 重量范围, required: true }
      - { key: eta, label: 预计时效(天), required: false }

order_flow:
  auto_confirm: false
  require_tracking_number: true
  auto_ship_delay_minutes: 30
  reminder_after_hours: 24
