name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify version matches
        run: |
          PACKAGE_VERSION=$(python -c "import src; print(src.__version__)")
          if [ "$PACKAGE_VERSION" != "${{ steps.get_version.outputs.VERSION }}" ]; then
            echo "Error: Tag version (${{ steps.get_version.outputs.VERSION }}) does not match package version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "✅ Version verified: $PACKAGE_VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            LICENSE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: create-release
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          cd client && npm ci && cd ..

      - name: Build frontend
        working-directory: ./client
        run: npm run build

      - name: Create release package
        run: |
          VERSION=$(python -c "import src; print(src.__version__)")
          mkdir -p dist/realxianyu-v${VERSION}
          cp -r src dist/realxianyu-v${VERSION}/
          cp -r client/dist dist/realxianyu-v${VERSION}/client/
          cp -r config dist/realxianyu-v${VERSION}/
          cp requirements.txt dist/realxianyu-v${VERSION}/
          cp .env.example dist/realxianyu-v${VERSION}/
          cp LICENSE dist/realxianyu-v${VERSION}/
          cp README.md dist/realxianyu-v${VERSION}/
          cd dist && tar -czf realxianyu-v${VERSION}.tar.gz realxianyu-v${VERSION}
          echo "Created: dist/realxianyu-v${VERSION}.tar.gz"

      - name: Upload release artifact
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
