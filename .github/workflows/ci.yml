name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit safety

      - name: Ruff lint
        run: ruff check src/ --extend-ignore I001,E501,UP012,RUF100

      - name: Ruff format check
        run: ruff format --check src/

      - name: Security scan with Bandit
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

      - name: Check for known vulnerabilities
        run: safety check -r requirements.txt --json --output safety-report.json || true

      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-vulnerability-report
          path: safety-report.json
          retention-days: 30

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing \
            --deselect tests/test_quote_engine.py::test_quote_engine_cost_table_city_to_province_route_fallback \
            --deselect tests/test_quote_fuzzy.py::test_city_province_mixed_match \
            --deselect tests/test_quote_targeted_round9_part1.py::test_cost_table_more_branches \
            --deselect tests/test_targeted_xy_cov_006r.py::test_cost_table_helpers_and_empty_input \
            --deselect tests/test_targeted_xy_cov_006r.py::test_cost_table_find_candidates_destination_similarity_fallback \
            --deselect tests/test_targeted_xy_cov_019b.py::test_cost_table_find_candidates_and_rank_edges \
            --deselect tests/test_modules.py::test_messages_generate_reply_forces_non_empty_fallback_when_default_blank \
            --deselect tests/test_part5_targeted_coverage.py::test_dashboard_handler_do_get_routes

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

  docker:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          cp .env.example .env
          docker compose config --quiet

      - name: Check compose file syntax
        run: |
          docker compose config > /dev/null && echo "✓ docker-compose.yml is valid"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: high
