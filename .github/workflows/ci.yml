name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Bootstrap Python
        uses: ./.github/actions/bootstrap-python
        with:
          install-command: |
            pip install -r requirements.txt
            pip install ruff bandit safety

      - name: Ruff lint
        run: ruff check src/ services/ --extend-ignore I001,E501,UP012,RUF100

      - name: Ruff format check
        run: ruff format --check src/

      - name: Security scan with Bandit
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Check for known vulnerabilities
        run: safety check -r requirements.txt --json --output safety-report.json || true

      - name: Upload Safety report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: safety-vulnerability-report
          path: safety-report.json
          if-no-files-found: ignore
          retention-days: 30

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - name: Bootstrap Python
        uses: ./.github/actions/bootstrap-python
        with:
          python-version: ${{ matrix.python-version }}
          install-command: |
            pip install -r requirements.txt -r requirements-dev.txt
            pip install -e services/common -e services/gateway-service

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Bootstrap Node.js
        uses: ./.github/actions/bootstrap-node
        with:
          node-version: "22"

      - name: Type check TypeScript
        working-directory: ./client
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: ./client
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: frontend-build
          path: client/dist/
          retention-days: 7

  build-verification:
    name: Full Build Verification
    runs-on: ubuntu-latest
    needs: [lint, test, frontend-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Bootstrap Python
        uses: ./.github/actions/bootstrap-python
        with:
          install-command: pip install -r requirements.txt

      - name: Bootstrap Node.js
        uses: ./.github/actions/bootstrap-node
        with:
          node-version: "22"

      - name: Build frontend
        working-directory: ./client
        run: npm run build

      - name: Verify dist folder exists
        run: |
          if [ ! -d "client/dist" ]; then
            echo "Error: client/dist folder not found after build"
            exit 1
          fi
          echo "✅ Frontend build verified"

      - name: Verify Python imports
        run: |
          python -c "import src; print('✅ Python imports working')"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Decide whether dependency review is available
        id: availability
        shell: bash
        run: |
          if [[ "${{ github.event.repository.private }}" == "true" && "${{ vars.ENABLE_DEPENDENCY_REVIEW }}" != "true" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.availability.outputs.enabled == 'true'

      - name: Dependency Review
        if: steps.availability.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

      - name: Dependency Review Skipped
        if: steps.availability.outputs.enabled != 'true'
        shell: bash
        run: |
          echo "Dependency Review is skipped because this repository is private and ENABLE_DEPENDENCY_REVIEW is not set to true."
          echo "Enable GitHub Advanced Security and set repository variable ENABLE_DEPENDENCY_REVIEW=true to enforce this job."

  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
