# ============================================
# Progressive Canary Strategy ConfigMap
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: canary-strategy
  namespace: xianyuflow
data:
  strategy.yaml: |
    stages:
      - name: "canary-10"
        description: "10% traffic to canary"
        weight: 10
        duration: "30m"
        checks:
          - error_rate < 1%
          - latency_p99 < 500ms

      - name: "canary-25"
        description: "25% traffic to canary"
        weight: 25
        duration: "1h"
        checks:
          - error_rate < 0.5%
          - latency_p99 < 400ms

      - name: "canary-50"
        description: "50% traffic to canary"
        weight: 50
        duration: "2h"
        checks:
          - error_rate < 0.1%
          - latency_p99 < 300ms

      - name: "canary-100"
        description: "100% traffic to canary"
        weight: 100
        duration: "30m"
        checks:
          - error_rate < 0.1%

      - name: "promote"
        description: "Promote canary to stable"
        action: promote
---
# ============================================
# Rollback Job (Emergency)
# ============================================
apiVersion: batch/v1
kind: Job
metadata:
  name: emergency-rollback
  namespace: xianyuflow
spec:
  template:
    spec:
      containers:
      - name: rollback
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Scaling down canary..."
          kubectl scale deployment/message-service-canary --replicas=0 -n xianyuflow

          echo "Scaling up stable..."
          kubectl scale deployment/message-service-stable --replicas=3 -n xianyuflow

          echo "Removing canary ingress..."
          kubectl annotate ingress/message-service-ingress nginx.ingress.kubernetes.io/canary- -n xianyuflow

          echo "Rollback complete"
      restartPolicy: OnFailure
  backoffLimit: 3
---
# ============================================
# Monitoring for Canary
# ============================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: canary-alerts
  namespace: monitoring
spec:
  groups:
  - name: canary
    rules:
    - alert: CanaryHighErrorRate
      expr: |
        (
          sum(rate(http_requests_total{version="canary",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{version="canary"}[5m]))
        ) > 0.01
      for: 5m
      labels:
        severity: warning
        service: message-service
      annotations:
        summary: "Canary has high error rate"
        description: "Canary error rate is {{ $value | humanizePercentage }}"

    - alert: CanaryHighLatency
      expr: |
        histogram_quantile(0.99,
          sum(rate(http_request_duration_seconds_bucket{version="canary"}[5m])) by (le)
        ) > 1
      for: 5m
      labels:
        severity: warning
        service: message-service
      annotations:
        summary: "Canary has high latency"
        description: "Canary P99 latency is {{ $value }}s"

    - alert: CanaryRollbackNeeded
      expr: |
        (
          sum(rate(http_requests_total{version="canary",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{version="canary"}[5m]))
        ) > 0.05
      for: 2m
      labels:
        severity: critical
        service: message-service
      annotations:
        summary: "Canary needs immediate rollback"
        description: "Canary error rate is {{ $value | humanizePercentage }}, rollback triggered"
