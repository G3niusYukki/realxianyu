# XianyuFlow v10 Phase 5: Canary Deployment Configuration
# Kubernetes native canary deployment using Flagger or native resources

# ============================================
# Method 1: Native Kubernetes Canary (Recommended for simplicity)
# ============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-service-stable
  namespace: xianyuflow
  labels:
    app: message-service
    version: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: message-service
      version: stable
  template:
    metadata:
      labels:
        app: message-service
        version: stable
    spec:
      containers:
      - name: message-service
        image: xianyuflow/message-service:v1.0.0
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: SERVICE_NAME
          value: "message-service"
        - name: LOG_LEVEL
          value: "info"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-service-canary
  namespace: xianyuflow
  labels:
    app: message-service
    version: canary
spec:
  replicas: 1  # Start with 1 canary pod
  selector:
    matchLabels:
      app: message-service
      version: canary
  template:
    metadata:
      labels:
        app: message-service
        version: canary
    spec:
      containers:
      - name: message-service
        image: xianyuflow/message-service:v1.1.0  # New version
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: SERVICE_NAME
          value: "message-service"
        - name: LOG_LEVEL
          value: "info"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
# Service with traffic splitting
apiVersion: v1
kind: Service
metadata:
  name: message-service
  namespace: xianyuflow
spec:
  selector:
    app: message-service  # Selects both stable and canary
  ports:
  - port: 80
    targetPort: 8000
    name: http
---
# ============================================
# Ingress with Canary Routing (using NGINX)
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: message-service-ingress
  namespace: xianyuflow
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"  # 10% traffic to canary
    nginx.ingress.kubernetes.io/canary-by-header: "X-Canary"
    nginx.ingress.kubernetes.io/canary-by-header-value: "always"
spec:
  rules:
  - host: api.xianyuflow.local
    http:
      paths:
      - path: /api/v1/messages
        pathType: Prefix
        backend:
          service:
            name: message-service
            port:
              number: 80
---
